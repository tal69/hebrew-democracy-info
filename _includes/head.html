<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ include.title }}</title>
<meta name="description" content="{{ include.description | strip_html | escape }}">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{ include.url | default: page.url | absolute_url }}">
<meta property="og:locale" content="he_IL">
<meta property="og:site_name" content="{{ site.data.site.siteNameHe | escape }}">
<meta property="og:type" content="{{ include.type | default: 'website' }}">
<meta property="og:title" content="{{ include.title | escape }}">
<meta property="og:description" content="{{ include.description | strip_html | escape }}">
<meta property="og:url" content="{{ include.url | default: page.url | absolute_url }}">
<meta property="og:image" content="{{ include.image | default: 'HEB_bold.jpg' | absolute_url }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ include.title | escape }}">
<meta name="twitter:description" content="{{ include.description | strip_html | escape }}">
<meta name="twitter:image" content="{{ include.image | default: 'HEB_bold.jpg' | absolute_url }}">
{% assign cache_version = site.data.site.cacheVersion | default: site.data.site.lastUpdated %}
<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}?v={{ cache_version | uri_escape }}">
<script>
(() => {
  const currentVersion = {{ cache_version | jsonify }};
  if (!currentVersion || !("fetch" in window) || !("URL" in window)) return;
  const versionUrl = {{ '/site-version.json' | relative_url | jsonify }};
  const separator = versionUrl.includes("?") ? "&" : "?";
  fetch(`${versionUrl}${separator}t=${Date.now()}`, { cache: "no-store", credentials: "same-origin" })
    .then((response) => response.ok ? response.json() : null)
    .then((data) => {
      const latestVersion = data && data.cacheVersion;
      if (!latestVersion || latestVersion === currentVersion) return;
      const pageUrl = new URL(window.location.href);
      if (pageUrl.searchParams.get("site_version") === latestVersion) return;
      pageUrl.searchParams.set("site_version", latestVersion);
      window.location.replace(pageUrl.toString());
    })
    .catch(() => {});
})();
</script>
{% include analytics.html %}
